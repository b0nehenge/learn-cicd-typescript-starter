name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fix npm version
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm ci --force

      - name: Run unit Tests
        run: npm run test -- --coverage

